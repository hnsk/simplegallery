services:
  app:
    build:
      context: .
    image: simplegallery:dev
    environment:
      SIMPLEGALLERY_WEB: /web
      SIMPLEGALLERY_GALLERY_SUBDIR: ${SIMPLEGALLERY_GALLERY_SUBDIR:-gallery}
      SIMPLEGALLERY_TITLE: ${SIMPLEGALLERY_TITLE:-Gallery}
      SIMPLEGALLERY_WORKERS: ${SIMPLEGALLERY_WORKERS:-4}
      SIMPLEGALLERY_LOG_LEVEL: ${SIMPLEGALLERY_LOG_LEVEL:-INFO}
      MAGICK_TIME_LIMIT: ${MAGICK_TIME_LIMIT:-86400}
    volumes:
      - ${SIMPLEGALLERY_WEB_DIR:-./web}:/web
    restart: unless-stopped

  test:
    build:
      context: .
    image: simplegallery:dev
    entrypoint: ["pytest"]
    command: ["-v"]
    working_dir: /app
    environment:
      SIMPLEGALLERY_SAMPLE_DATA: /sample-data
      MAGICK_TIME_LIMIT: "86400"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./sample-data:/sample-data:ro
    restart: "no"

  shell:
    build:
      context: .
    image: simplegallery:dev
    entrypoint: ["sh"]
    command: ["-c", "exec sh"]
    working_dir: /app
    environment:
      SIMPLEGALLERY_SAMPLE_DATA: /sample-data
      MAGICK_TIME_LIMIT: "86400"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./sample-data:/sample-data:ro
    restart: "no"
